name: 更新贡献轨迹

on:
  schedule:
    - cron: "17 1 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/scripts/render-contributions.mjs"
      - ".github/workflows/render-contributions.yml"

permissions:
  contents: write

concurrency:
  group: contribution-trace
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: main

      - name: 生成贡献轨迹
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
        run: node .github/scripts/render-contributions.mjs

      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/contributions.svg assets/contributions-mobile.svg
          if git diff --cached --quiet; then
            echo "贡献轨迹没有变化"
            exit 0
          fi
          git commit -m "chore(profile): 更新贡献轨迹"
          git push
