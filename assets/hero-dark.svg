<svg xmlns="http://www.w3.org/2000/svg" width="768" height="269" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Stephem Haul — Systems Builder</title>
  <desc id="desc">A restrained engineering console visual for AI agents, knowledge systems, and calm software.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#090d12" />
      <stop offset="0.55" stop-color="#0d141d" />
      <stop offset="1" stop-color="#0a1720" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#67e8f9" stop-opacity="0.18" />
      <stop offset="0.55" stop-color="#38bdf8" stop-opacity="0.06" />
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e" stop-opacity="0.15" />
      <stop offset="0.5" stop-color="#67e8f9" />
      <stop offset="1" stop-color="#60a5fa" stop-opacity="0.2" />
    </linearGradient>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#94a3b8" stroke-opacity="0.045" stroke-width="1" />
    </pattern>
    <clipPath id="clip">
      <rect x="1" y="1" width="1198" height="418" rx="28" />
    </clipPath>
    <filter id="soft-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <style>
    .signal-line { opacity: .78; }
    .flow-line { stroke-dashoffset: 0; }
    .core-node { opacity: 1; transform-origin: 1013px 205px; }
    @media (prefers-reduced-motion: no-preference) {
      .signal-line { animation: signal-pulse 8s ease-in-out infinite; }
      .flow-line { animation: signal-flow 5s linear infinite; }
      .core-node { animation: core-pulse 6s ease-in-out infinite; }
    }
    @keyframes signal-pulse { 0%, 100% { opacity: .45; } 50% { opacity: 1; } }
    @keyframes signal-flow { to { stroke-dashoffset: -34; } }
    @keyframes core-pulse { 0%, 100% { opacity: .72; } 50% { opacity: 1; } }
  </style>

  <rect x="1" y="1" width="1198" height="418" rx="28" fill="url(#bg)" stroke="#263241" />
  <g clip-path="url(#clip)">
    <rect x="1" y="1" width="1198" height="418" fill="url(#grid)" />
    <circle cx="986" cy="210" r="260" fill="url(#glow)" />
    <path d="M 0 350 C 230 314 342 399 570 358 S 965 305 1200 348" fill="none" stroke="#38bdf8" stroke-opacity="0.06" stroke-width="1" />
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <circle cx="64" cy="52" r="4" fill="#22c55e" filter="url(#soft-glow)" />
    <text x="79" y="57" fill="#75869a" font-size="12" letter-spacing="2.2">STOPHEMO // PROFILE_SYSTEM</text>
    <text x="1080" y="57" fill="#22c55e" font-size="11" letter-spacing="1.8">ONLINE</text>
  </g>

  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="62" y="148" fill="#f4f7fb" font-size="64" font-weight="760" letter-spacing="1.8">STEPHEM HAUL</text>
    <text x="65" y="187" fill="#9dafc3" font-size="20" letter-spacing="0.5">Systems that remember. Tools that stay out of the way.</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12">
    <rect x="64" y="231" width="185" height="38" rx="9" fill="#101923" stroke="#263647" />
    <text x="82" y="255" fill="#67e8f9" letter-spacing="1.2">AI AGENTS</text>
    <rect x="261" y="231" width="216" height="38" rx="9" fill="#101923" stroke="#263647" />
    <text x="279" y="255" fill="#a5b4fc" letter-spacing="1.2">KNOWLEDGE SYSTEMS</text>
    <rect x="489" y="231" width="185" height="38" rx="9" fill="#101923" stroke="#263647" />
    <text x="507" y="255" fill="#86efac" letter-spacing="1.2">CALM SOFTWARE</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="65" y="337" fill="#536579" font-size="11" letter-spacing="2">CURRENT VECTOR</text>
    <line x1="64" y1="357" x2="682" y2="357" stroke="#263647" />
    <line class="signal-line" x1="64" y1="357" x2="405" y2="357" stroke="url(#signal)" stroke-width="2.2" stroke-linecap="round" />
    <text x="64" y="383" fill="#8293a7" font-size="12" letter-spacing="1.15">IDEA → MODEL → SYSTEM → COMPOUNDING VALUE</text>
  </g>

  <g aria-hidden="true">
    <circle cx="1013" cy="205" r="106" fill="none" stroke="#67e8f9" stroke-opacity="0.08" />
    <circle cx="1013" cy="205" r="76" fill="none" stroke="#67e8f9" stroke-opacity="0.12" stroke-dasharray="3 8" />
    <circle cx="1013" cy="205" r="40" fill="#0c1821" stroke="#67e8f9" stroke-opacity="0.7" />
    <circle class="core-node" cx="1013" cy="205" r="8" fill="#67e8f9" filter="url(#soft-glow)" />

    <path d="M 1013 165 L 942 132 L 894 180 M 1013 165 L 1074 128 L 1123 166 M 1013 245 L 942 283 L 893 241 M 1013 245 L 1079 287 L 1132 247" fill="none" stroke="#67e8f9" stroke-opacity="0.34" />
    <path d="M 942 132 L 1074 128 M 894 180 L 893 241 M 1123 166 L 1132 247 M 942 283 L 1079 287" fill="none" stroke="#94a3b8" stroke-opacity="0.15" stroke-dasharray="5 7" />
    <path class="flow-line" d="M 894 180 C 946 161 960 202 1013 205 S 1074 237 1132 247" fill="none" stroke="#67e8f9" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="7 10" />

    <g fill="#0b1118" stroke="#67e8f9" stroke-width="1.2">
      <circle cx="942" cy="132" r="8" />
      <circle cx="894" cy="180" r="8" />
      <circle cx="893" cy="241" r="8" />
      <circle cx="942" cy="283" r="8" />
      <circle cx="1074" cy="128" r="8" />
      <circle cx="1123" cy="166" r="8" />
      <circle cx="1132" cy="247" r="8" />
      <circle cx="1079" cy="287" r="8" />
    </g>

    <g fill="#7f91a5" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="10" letter-spacing="1.4">
      <text x="866" y="159">RAW</text>
      <text x="1091" y="143">SCHEMA</text>
      <text x="991" y="228">WIKI</text>
    </g>
  </g>
</svg>
