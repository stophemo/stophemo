<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="760" viewBox="0 0 1440 760" role="img" aria-labelledby="title desc">
  <title id="title">Stophemo: beyond the horizon</title>
  <desc id="desc">A slow animated horizon. A lone traveler moves across a mountain world toward a warm signal beyond the ridge.</desc>
  <style>
    .hairline { fill: none; stroke-linecap: round; stroke-linejoin: round; vector-effect: non-scaling-stroke; }
    .arc-drift { animation: arcDrift 24s ease-in-out infinite; }
    .ridge-far { animation: ridgeFar 18s ease-in-out infinite; }
    .ridge-mid { animation: ridgeMid 14s ease-in-out infinite; }
    .route-flow { animation: routeFlow 12s linear infinite; }
    .route-reveal { animation: routeReveal 12s ease-in-out infinite; opacity: .16; stroke-dasharray: .12 .88; }
    .horizon-beam { animation: beamSweep 12s ease-in-out infinite; opacity: .12; }
    .beacon { animation: beaconPulse 4.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .beacon-halo { animation: haloPulse 4.2s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .traveler-step { animation: travelerStep 18s ease-in-out infinite; }
    .traveler-bob { animation: travelerBob 2.4s ease-in-out infinite; }
    .leg-left { animation: legLeft 1.2s ease-in-out infinite; transform-box: fill-box; transform-origin: 100% 0; }
    .leg-right { animation: legRight 1.2s ease-in-out infinite; transform-box: fill-box; transform-origin: 0 0; }
    .scarf { animation: scarfWind 2.8s ease-in-out infinite; opacity: .6; }
    .sky-pin { animation: skyPin 7s ease-in-out infinite; opacity: .45; }

    @keyframes arcDrift { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-20px); } }
    @keyframes ridgeFar { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(-18px); } }
    @keyframes ridgeMid { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(14px); } }
    @keyframes routeFlow { from { stroke-dashoffset: 0; } to { stroke-dashoffset: -140; } }
    @keyframes routeReveal { 0%, 12% { stroke-dasharray: .12 .88; opacity: .16; } 48% { stroke-dasharray: .46 .54; opacity: .38; } 76%, 88% { stroke-dasharray: 1 0; opacity: .58; } 100% { stroke-dasharray: .12 .88; opacity: .16; } }
    @keyframes beamSweep { 0%, 100% { opacity: .04; transform: translateX(-24px); } 50% { opacity: .2; transform: translateX(22px); } }
    @keyframes beaconPulse { 0%, 100% { opacity: .35; transform: scale(.76); } 50% { opacity: 1; transform: scale(1); } }
    @keyframes haloPulse { 0%, 100% { opacity: .2; transform: scale(.7); } 50% { opacity: 0; transform: scale(2.1); } }
    @keyframes travelerStep { 0%, 100% { transform: translateX(0); } 50% { transform: translateX(44px); } }
    @keyframes travelerBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2px); } }
    @keyframes legLeft { 0%, 100% { transform: rotate(12deg); } 50% { transform: rotate(-13deg); } }
    @keyframes legRight { 0%, 100% { transform: rotate(-13deg); } 50% { transform: rotate(12deg); } }
    @keyframes scarfWind { 0%, 100% { transform: translateX(0); opacity: .38; } 50% { transform: translateX(7px); opacity: .85; } }
    @keyframes skyPin { 0%, 100% { opacity: .25; } 50% { opacity: .72; } }

    @media (prefers-reduced-motion: reduce) {
      .arc-drift, .ridge-far, .ridge-mid, .route-flow, .route-reveal, .horizon-beam, .beacon, .beacon-halo, .traveler-step, .traveler-bob, .leg-left, .leg-right, .scarf, .sky-pin { animation: none !important; }
      .route-reveal { stroke-dasharray: .55 .45; opacity: .38; }
      .beacon { opacity: .8; transform: none; }
      .beacon-halo { opacity: .14; transform: none; }
    }
  </style>

  <rect width="1440" height="760" fill="#0B1012" />

  <g fill="#D2D8CF">
    <circle class="sky-pin" cx="164" cy="142" r="1.5" />
    <circle cx="442" cy="98" r="1" opacity=".28" />
    <circle class="sky-pin" cx="786" cy="166" r="1.2" style="animation-delay:-3s" />
    <circle cx="1242" cy="128" r="1.1" opacity=".28" />
    <circle class="sky-pin" cx="1310" cy="260" r="1.3" style="animation-delay:-5s" />
  </g>

  <!-- A single planetary arc gives the landscape a sense of world-scale. -->
  <g class="hairline arc-drift" stroke="#415352" opacity=".34">
    <path d="M72 496 C190 212 486 54 807 80 C1092 103 1296 264 1372 498" stroke-width="1.3" />
    <path d="M150 486 C294 268 504 142 768 156 C1010 170 1190 294 1282 486" stroke-width=".75" opacity=".62" />
  </g>

  <g class="ridge-far">
    <path d="M-70 548 C72 509 140 474 248 489 L350 398 L419 468 L522 424 L606 470 L716 344 L803 458 L894 412 L974 454 L1086 328 L1163 423 L1258 366 L1510 452 L1510 760 L-70 760 Z" fill="#2A3434" />
    <path class="hairline" d="M-70 548 C72 509 140 474 248 489 L350 398 L419 468 L522 424 L606 470 L716 344 L803 458 L894 412 L974 454 L1086 328 L1163 423 L1258 366 L1510 452" stroke="#72807A" opacity=".52" stroke-width="1.15" />
    <path class="hairline" d="M-40 581 C110 538 182 522 292 535 L382 470 L462 526 L568 478 L654 530 L739 426 L830 520 L930 464 L1008 518 L1100 421 L1205 500 L1310 444 L1490 505" stroke="#4C5C59" opacity=".7" stroke-width="1" />
  </g>

  <g class="ridge-mid">
    <path d="M-80 624 C60 585 174 568 302 596 C437 626 516 543 639 572 C772 603 846 541 974 570 C1104 599 1214 524 1518 564 L1518 760 L-80 760 Z" fill="#1B3936" />
    <path class="hairline" d="M-80 624 C60 585 174 568 302 596 C437 626 516 543 639 572 C772 603 846 541 974 570 C1104 599 1214 524 1518 564" stroke="#617A71" opacity=".47" stroke-width="1.2" />
    <path class="hairline" d="M-80 663 C92 624 194 622 320 640 C451 658 543 596 673 618 C810 642 886 594 1020 620 C1165 648 1286 588 1510 616" stroke="#31534D" opacity=".72" />
  </g>

  <!-- Low mist is kept as a line so the image stays flat and quiet. -->
  <path class="hairline ridge-mid" d="M-40 575 C234 550 472 568 698 548 S1160 542 1480 566" stroke="#B4C0B8" opacity=".08" stroke-width="13" />

  <path d="M-80 690 C126 647 294 657 454 689 C628 724 773 654 934 682 C1103 711 1266 644 1520 668 L1520 760 L-80 760 Z" fill="#0E1819" />
  <path class="hairline" d="M-80 690 C126 647 294 657 454 689 C628 724 773 654 934 682 C1103 711 1266 644 1520 668" stroke="#718079" opacity=".36" stroke-width="1.2" />
  <path class="hairline route-flow" d="M-20 735 C192 706 320 711 486 730 S800 709 1004 724 S1272 700 1490 716" stroke="#344B47" opacity=".62" stroke-width="1" stroke-dasharray="2 18" />

  <!-- The route is revealed toward the only warm point in the world. -->
  <path class="hairline route-flow" d="M322 681 C478 647 608 604 724 563 C860 516 1011 468 1160 421" stroke="#C2CBC2" opacity=".32" stroke-width="1.5" stroke-dasharray="2 14" />
  <path class="hairline route-reveal" d="M322 681 C478 647 608 604 724 563 C860 516 1011 468 1160 421" pathLength="1" stroke="#E8A24A" stroke-width="1.9" />

  <path class="hairline horizon-beam" d="M920 431 C1008 422 1096 426 1248 435" stroke="#E8A24A" stroke-width="1.1" />
  <g>
    <path class="hairline" d="M1126 425 A38 38 0 0 1 1202 425" stroke="#E8A24A" stroke-width="1.4" opacity=".5" />
    <g class="beacon"><circle cx="1164" cy="411" r="4" fill="#E8A24A" /></g>
    <g class="beacon-halo"><circle cx="1164" cy="411" r="15" fill="none" stroke="#E8A24A" stroke-width="1" /></g>
  </g>

  <!-- The traveler has a hood, pack, pole and wind-caught scarf, kept as one silhouette. -->
  <g class="traveler-step">
    <g class="traveler-bob">
      <g transform="translate(274 500) scale(1.2)">
        <path d="M4 48 C0 54 -2 76 1 91 L16 95 L23 67 L21 47 Z" fill="#152524" stroke="#73847C" stroke-width="1.1" />
        <path d="M18 43 C26 35 42 34 51 41 L59 86 C47 96 23 96 11 87 L14 57 Z" fill="#080D0F" stroke="#B0B9B0" stroke-width="1.1" />
        <path d="M19 29 C19 14 28 7 39 9 C52 11 56 22 52 36 L43 43 L25 39 Z" fill="#0A1112" stroke="#84928A" stroke-width="1.2" />
        <path d="M20 27 C28 20 42 20 53 27" class="hairline" stroke="#D0D5CC" opacity=".48" stroke-width="1" />
        <path d="M13 53 C23 58 45 58 55 52" class="hairline" stroke="#526761" opacity=".55" />
        <g transform="translate(23 87)">
          <g class="leg-left"><path d="M0 0 L-8 39" class="hairline" stroke="#080D0F" stroke-width="6" /><path d="M-11 39 L0 39" class="hairline" stroke="#080D0F" stroke-width="5" /></g>
        </g>
        <g transform="translate(43 87)">
          <g class="leg-right"><path d="M0 0 L10 39" class="hairline" stroke="#080D0F" stroke-width="6" /><path d="M8 39 L19 39" class="hairline" stroke="#080D0F" stroke-width="5" /></g>
        </g>
        <path d="M48 53 L70 66" class="hairline" stroke="#080D0F" stroke-width="6" />
        <path d="M65 63 L83 99" class="hairline" stroke="#B7C2B9" stroke-width="1.5" opacity=".8" />
        <path d="M45 43 C63 37 75 39 89 47" class="hairline scarf" stroke="#E8A24A" stroke-width="2.2" />
        <path d="M51 51 L68 50" class="hairline" stroke="#E8A24A" stroke-width="1.5" opacity=".72" />
      </g>
    </g>
  </g>

  <path class="hairline" d="M0 475 C224 470 430 474 656 470 S1090 465 1440 472" stroke="#D2D8CF" opacity=".14" stroke-width="1" />
</svg>
