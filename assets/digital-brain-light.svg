<svg xmlns="http://www.w3.org/2000/svg" width="768" height="198" viewBox="0 0 1200 310" role="img" aria-labelledby="title desc">
  <title id="title">Digital Brain</title>
  <desc id="desc">An agent-agnostic knowledge system built from Schema, Wiki, and Raw layers.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" />
      <stop offset="1" stop-color="#f2f8fb" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#16a34a" />
      <stop offset="0.55" stop-color="#0891b2" />
      <stop offset="1" stop-color="#2563eb" />
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#0891b2" />
    </marker>
  </defs>
  <style>
    .pulse-line { opacity: .72; }
    @media (prefers-reduced-motion: no-preference) {
      .pulse-line { animation: pulse 4s ease-in-out infinite; }
    }
    @keyframes pulse { 0%, 100% { opacity: .35; } 50% { opacity: 1; } }
  </style>

  <rect x="1" y="1" width="1198" height="308" rx="22" fill="url(#bg)" stroke="#d6e0e8" />
  <rect x="1" y="1" width="5" height="308" rx="2.5" fill="url(#accent)" />

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <text x="54" y="51" fill="#0e7490" font-size="12" letter-spacing="2">FEATURED SYSTEM / 01</text>
  </g>
  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="52" y="106" fill="#172033" font-size="42" font-weight="730">Digital Brain</text>
    <text x="54" y="141" fill="#526274" font-size="17">A persistent knowledge system maintained by LLMs,</text>
    <text x="54" y="167" fill="#526274" font-size="17">directed by humans, and owned as plain files.</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="11" letter-spacing="1">
    <rect x="54" y="207" width="121" height="33" rx="8" fill="#ffffff" stroke="#d6e0e8" />
    <text x="71" y="228" fill="#0e7490">LLM WIKI</text>
    <rect x="186" y="207" width="154" height="33" rx="8" fill="#ffffff" stroke="#d6e0e8" />
    <text x="202" y="228" fill="#4f46e5">AGENT-AGNOSTIC</text>
    <rect x="351" y="207" width="117" height="33" rx="8" fill="#ffffff" stroke="#d6e0e8" />
    <text x="368" y="228" fill="#15803d">PLAIN FILES</text>
    <circle cx="59" cy="270" r="4" fill="#16a34a" />
    <text x="73" y="274" fill="#657588">ACTIVE BUILD · OPEN SOURCE</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <rect x="690" y="35" width="446" height="62" rx="11" fill="#ffffff" stroke="#d6e0e8" />
    <text x="714" y="61" fill="#172033" font-size="13" font-weight="700" letter-spacing="1.5">SCHEMA</text>
    <text x="814" y="61" fill="#64748b" font-size="11" letter-spacing="1">RULES · BOUNDARIES · WORKFLOW</text>
    <text x="714" y="82" fill="#657588" font-size="11">How the system maintains knowledge safely</text>

    <rect x="690" y="123" width="446" height="62" rx="11" fill="#ecfeff" stroke="#0891b2" stroke-opacity="0.75" />
    <text x="714" y="149" fill="#172033" font-size="13" font-weight="700" letter-spacing="1.5">WIKI</text>
    <text x="814" y="149" fill="#0e7490" font-size="11" letter-spacing="1">COMPILED KNOWLEDGE</text>
    <text x="714" y="170" fill="#526b7d" font-size="11">Linked, distilled, and continuously evolving</text>

    <rect x="690" y="211" width="446" height="62" rx="11" fill="#ffffff" stroke="#d6e0e8" />
    <text x="714" y="237" fill="#172033" font-size="13" font-weight="700" letter-spacing="1.5">RAW</text>
    <text x="814" y="237" fill="#64748b" font-size="11" letter-spacing="1">IMMUTABLE SOURCES</text>
    <text x="714" y="258" fill="#657588" font-size="11">Read-only facts with traceable provenance</text>

    <path class="pulse-line" d="M 1101 210 L 1101 190" fill="none" stroke="#0891b2" stroke-width="1.4" marker-end="url(#arrow)" />
    <path d="M 673 66 C 644 66 644 242 673 242" fill="none" stroke="#ca8a04" stroke-opacity="0.45" stroke-width="1.2" stroke-dasharray="4 6" />
  </g>
</svg>
