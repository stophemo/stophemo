<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="480"
     height="640"
     viewBox="0 0 480 640"
     role="img"
     aria-labelledby="field-title field-desc"
     focusable="false">
  <title id="field-title">Stophemo Field Log</title>
  <desc id="field-desc">An animated field map. A small probe visits Woo, Woo Todo and Digital Brain before following an unfinished route toward AI.</desc>

  <style>
    .mono {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      letter-spacing: 0;
    }

    .grid-drift { animation: grid-drift 16s linear infinite; }
    .scan-line { animation: scan-line 12s ease-in-out infinite; }
    .route-live { animation: route-live 12s ease-in-out infinite; }
    .route-next { animation: route-next 3.2s linear infinite; }
    .probe { animation: probe-route 12s cubic-bezier(.45, 0, .2, 1) infinite; }
    .probe-core { animation: probe-core 1.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .probe-ring { animation: probe-ring 2.4s ease-out infinite; transform-box: fill-box; transform-origin: center; }
    .node-woo { animation: node-woo 12s ease-out infinite; transform-box: fill-box; transform-origin: center; }
    .node-todo { animation: node-todo 12s ease-out infinite; transform-box: fill-box; transform-origin: center; }
    .node-brain { animation: node-brain 12s ease-out infinite; transform-box: fill-box; transform-origin: center; }
    .node-ai { animation: node-ai 4s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .log-0 { animation: log-0 12s steps(1, end) infinite; }
    .log-1 { animation: log-1 12s steps(1, end) infinite; }
    .log-2 { animation: log-2 12s steps(1, end) infinite; }
    .log-3 { animation: log-3 12s steps(1, end) infinite; }
    .log-4 { animation: log-4 12s steps(1, end) infinite; }
    .signal { animation: signal 2.4s steps(2, end) infinite; }

    @keyframes grid-drift { from { transform: translate(0, 0); } to { transform: translate(22px, 22px); } }
    @keyframes scan-line {
      0%, 8% { transform: translateY(0); opacity: 0; }
      14% { opacity: .38; }
      82% { opacity: .16; }
      92%, 100% { transform: translateY(356px); opacity: 0; }
    }
    @keyframes route-live {
      0%, 8% { stroke-dashoffset: 1; opacity: .2; }
      67%, 88% { stroke-dashoffset: .06; opacity: .9; }
      100% { stroke-dashoffset: 0; opacity: 0; }
    }
    @keyframes route-next { to { stroke-dashoffset: -28; } }
    @keyframes probe-route {
      0%, 7% { transform: translate(70px, 485px); opacity: 0; }
      10% { opacity: 1; }
      23% { transform: translate(145px, 405px); opacity: 1; }
      40% { transform: translate(302px, 442px); }
      58% { transform: translate(238px, 305px); }
      76%, 90% { transform: translate(385px, 205px); opacity: 1; }
      100% { transform: translate(385px, 205px); opacity: 0; }
    }
    @keyframes probe-core {
      0%, 100% { transform: scale(.82); opacity: .72; }
      50% { transform: scale(1); opacity: 1; }
    }
    @keyframes probe-ring {
      0% { transform: scale(.45); opacity: .7; }
      72%, 100% { transform: scale(1.9); opacity: 0; }
    }
    @keyframes node-woo {
      0%, 17% { transform: scale(.65); opacity: .22; }
      23% { transform: scale(1.35); opacity: 1; }
      29%, 100% { transform: scale(1); opacity: .72; }
    }
    @keyframes node-todo {
      0%, 34% { transform: scale(.65); opacity: .22; }
      40% { transform: scale(1.35); opacity: 1; }
      46%, 100% { transform: scale(1); opacity: .72; }
    }
    @keyframes node-brain {
      0%, 52% { transform: scale(.65); opacity: .22; }
      58% { transform: scale(1.35); opacity: 1; }
      64%, 100% { transform: scale(1); opacity: .72; }
    }
    @keyframes node-ai {
      0%, 100% { transform: scale(.78); opacity: .42; }
      50% { transform: scale(1.08); opacity: 1; }
    }
    @keyframes log-0 { 0%, 11% { opacity: 1; } 12%, 100% { opacity: 0; } }
    @keyframes log-1 { 0%, 11% { opacity: 0; } 12%, 34% { opacity: 1; } 35%, 100% { opacity: 0; } }
    @keyframes log-2 { 0%, 34% { opacity: 0; } 35%, 54% { opacity: 1; } 55%, 100% { opacity: 0; } }
    @keyframes log-3 { 0%, 54% { opacity: 0; } 55%, 74% { opacity: 1; } 75%, 100% { opacity: 0; } }
    @keyframes log-4 { 0%, 74% { opacity: 0; } 75%, 100% { opacity: 1; } }
    @keyframes signal { 0%, 72% { opacity: 1; } 73%, 100% { opacity: .28; } }

    @media (prefers-reduced-motion: reduce) {
      .grid-drift,
      .scan-line,
      .route-live,
      .route-next,
      .probe,
      .probe-core,
      .probe-ring,
      .node-woo,
      .node-todo,
      .node-brain,
      .node-ai,
      .log-0,
      .log-1,
      .log-2,
      .log-3,
      .log-4,
      .signal { animation: none !important; }

      .scan-line,
      .probe-ring,
      .log-0,
      .log-1,
      .log-2,
      .log-3 { display: none; }

      .route-live { stroke-dashoffset: .06; opacity: .9; }
      .probe { transform: translate(385px, 205px); opacity: 1; }
      .node-woo,
      .node-todo,
      .node-brain { opacity: .72; }
      .node-ai,
      .log-4 { opacity: 1; }
    }
  </style>

  <defs>
    <clipPath id="map-clip">
      <rect x="18" y="162" width="444" height="386"/>
    </clipPath>
    <pattern id="field-grid" width="22" height="22" patternUnits="userSpaceOnUse">
      <path d="M22 0H0V22" fill="none" stroke="#232830" stroke-width="1"/>
      <circle cx="1" cy="1" r="1" fill="#363D46"/>
    </pattern>
  </defs>

  <rect width="480" height="640" fill="#0B0D10"/>
  <rect x="1" y="1" width="478" height="638" fill="none" stroke="#2A3038"/>
  <rect width="480" height="6" fill="#65D6A6"/>

  <g class="mono">
    <text x="20" y="34" fill="#E7E9EC" font-size="15" font-weight="800">STOPHEMO</text>
    <text x="116" y="34" fill="#7F8994" font-size="12" font-weight="700">FIELD LOG / 07</text>
    <circle class="signal" cx="451" cy="29" r="3" fill="#65D6A6"/>
    <path d="M18 54H462" stroke="#2A3038"/>

    <text x="20" y="81" fill="#7F8994" font-size="11" font-weight="700">FIELD NOTE 001</text>
    <text x="20" y="116" fill="#E7E9EC" font-size="27" font-weight="800">FOLLOW CURIOSITY.</text>
    <path d="M20 132H102" stroke="#65D6A6" stroke-width="4"/>
    <path d="M108 132H132" stroke="#E6B566" stroke-width="4"/>
    <text x="300" y="130" fill="#7F8994" font-size="10" font-weight="700">EXPLORING AI</text>

    <g clip-path="url(#map-clip)">
      <rect x="18" y="162" width="444" height="386" fill="#0E1115"/>
      <g class="grid-drift">
        <rect x="-4" y="140" width="488" height="430" fill="url(#field-grid)" opacity=".68"/>
      </g>

      <g fill="#7F8994" font-size="10" font-weight="700">
        <text x="31" y="182">ROUTE / ACTIVE</text>
        <text x="378" y="182">03 + 01</text>
        <text x="31" y="531">SCALE 1:07</text>
      </g>

      <g opacity=".36" stroke="#65707B" fill="none">
        <path d="M70 485L145 405L302 442L238 305L385 205L436 177" stroke-dasharray="3 9"/>
        <circle cx="70" cy="485" r="14"/>
        <circle cx="145" cy="405" r="21"/>
        <circle cx="302" cy="442" r="21"/>
        <circle cx="238" cy="305" r="21"/>
      </g>

      <path class="route-live"
            d="M70 485L145 405L302 442L238 305L385 205"
            pathLength="1"
            fill="none"
            stroke="#65D6A6"
            stroke-width="2"
            stroke-dasharray="1"
            stroke-dashoffset="1"/>
      <path class="route-next"
            d="M385 205L436 177"
            fill="none"
            stroke="#E6B566"
            stroke-width="1.5"
            stroke-dasharray="3 8"/>

      <g aria-hidden="true">
        <g transform="translate(145 405)">
          <circle class="node-woo" r="8" fill="#0E1115" stroke="#65D6A6" stroke-width="2"/>
          <circle r="2.5" fill="#65D6A6"/>
        </g>
        <g transform="translate(302 442)">
          <circle class="node-todo" r="8" fill="#0E1115" stroke="#65D6A6" stroke-width="2"/>
          <circle r="2.5" fill="#65D6A6"/>
        </g>
        <g transform="translate(238 305)">
          <circle class="node-brain" r="8" fill="#0E1115" stroke="#65D6A6" stroke-width="2"/>
          <circle r="2.5" fill="#65D6A6"/>
        </g>
        <g transform="translate(385 205)">
          <circle class="node-ai" r="16" fill="none" stroke="#E6B566"/>
          <circle r="5" fill="#E6B566"/>
          <path d="M-27 0H-20M20 0H27M0-27V-20M0 20V27" stroke="#E6B566"/>
        </g>
      </g>

      <g fill="#A7B0BA" font-size="12" font-weight="700">
        <text x="115" y="379">01 / WOO</text>
        <text x="270" y="472">02 / WOO-TODO</text>
        <text x="185" y="278">03 / DIGITAL-BRAIN</text>
        <text x="343" y="236" fill="#E6B566">AI / NEXT</text>
      </g>

      <g class="probe" opacity="0" aria-hidden="true">
        <circle class="probe-ring" r="14" fill="none" stroke="#76B7FF"/>
        <g class="probe-core">
          <path d="M0-9L7 0L0 9L-7 0Z" fill="#E7E9EC"/>
          <path d="M0-4L3 0L0 4L-3 0Z" fill="#76B7FF"/>
        </g>
      </g>

      <g class="scan-line" opacity="0" aria-hidden="true">
        <rect x="18" y="162" width="444" height="24" fill="#76B7FF" opacity=".04"/>
        <path d="M18 186H462" stroke="#76B7FF" opacity=".55"/>
      </g>
    </g>

    <path d="M18 570H462" stroke="#2A3038"/>
    <text x="20" y="596" fill="#7F8994" font-size="10" font-weight="700">LIVE ENTRY</text>
    <g fill="#C8CDD2" font-size="12" font-weight="700">
      <text class="log-0" x="20" y="617">BOOTING FIELD SCAN</text>
      <text class="log-1" x="20" y="617" opacity="0">SIGNAL / WOO</text>
      <text class="log-2" x="20" y="617" opacity="0">SIGNAL / WOO-TODO</text>
      <text class="log-3" x="20" y="617" opacity="0">SIGNAL / BRAIN</text>
      <text class="log-4" x="20" y="617" opacity="0">NEXT / UNKNOWN</text>
    </g>
    <text x="324" y="617" fill="#A7B0BA" font-size="10" font-weight="700">ROUTE UNFOLDING</text>
  </g>
</svg>
