<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="720"
     height="640"
     viewBox="0 0 720 640"
     role="img"
     aria-labelledby="hero-title hero-desc"
     focusable="false">
  <title id="hero-title">Stophemo，为不值得立项的小问题写代码</title>
  <desc id="hero-desc">Stophemo 的移动版个人页横幅。上半部分介绍他的工作方式，下半部分用四格编号展示观察、构建、使用和修订的循环。</desc>

  <style>
    .sans {
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .mono {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    .route {
      animation: route-shift 12s linear infinite;
    }

    .pulse {
      animation: quiet-pulse 3.8s ease-in-out infinite;
    }

    @keyframes route-shift {
      to { stroke-dashoffset: -152; }
    }

    @keyframes quiet-pulse {
      0%, 100% { opacity: .3; }
      50% { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .route,
      .pulse {
        animation: none !important;
      }

      .pulse { opacity: 1; }
    }
  </style>

  <rect width="720" height="640" fill="#F4F6F3"/>
  <rect width="720" height="8" fill="#3D63FF"/>

  <g fill="none" stroke="#C7CED1" stroke-width="1" opacity=".55" aria-hidden="true">
    <path d="M40 64 H680"/>
    <path d="M40 151 H680"/>
    <path d="M40 377 H680"/>
    <path d="M40 26 V377"/>
    <path d="M680 26 V377"/>
  </g>

  <g class="mono" fill="#536067" font-size="12" font-weight="700">
    <text x="40" y="43">SOFTWARE ENGINEER / WEB · DESKTOP · ANDROID</text>
  </g>

  <g class="sans" fill="#17191F">
    <text x="40" y="130" font-size="76" font-weight="780"
          textLength="512" lengthAdjust="spacingAndGlyphs">STOPHEMO</text>
    <rect x="40" y="143" width="106" height="7" fill="#3D63FF"/>
    <rect x="153" y="143" width="20" height="7" fill="#FF5B4D"/>

    <text x="40" y="205" font-size="36" font-weight="720">I WRITE CODE FOR</text>
    <text x="40" y="248" font-size="36" font-weight="720">PROBLEMS TOO SMALL</text>
    <text x="40" y="291" font-size="36" font-weight="720">FOR A ROADMAP.</text>

    <text x="40" y="334" fill="#536067" font-size="19" font-weight="520">
      Most start as minor annoyances. The useful ones stay.
    </text>
    <text x="40" y="363" fill="#536067" font-size="19" font-weight="520">
      The rest become notes, or a reason to learn a new language.
    </text>
  </g>

  <rect y="394" width="720" height="246" fill="#17191F"/>
  <rect y="394" width="720" height="6" fill="#FF5B4D"/>
  <rect y="633" width="720" height="7" fill="#C7F464"/>

  <g class="mono" fill="#A7B0B5" font-size="12" font-weight="700">
    <text x="40" y="430">HOW THINGS TEND TO HAPPEN</text>
    <text x="536" y="430">NOT TO SCALE</text>
  </g>

  <g fill="none" stroke="#566067" stroke-width="1" aria-hidden="true">
    <path d="M40 450 H680"/>
    <path d="M40 531 H680"/>
    <path d="M360 450 V614"/>
  </g>

  <path class="route" d="M24 465 H696 V603 H379"
        fill="none" stroke="#C7F464" stroke-width="2"
        stroke-dasharray="8 11" stroke-linecap="square" aria-hidden="true"/>
  <path d="M387 596 L379 603 L387 610" fill="none" stroke="#C7F464" stroke-width="2" aria-hidden="true"/>

  <g class="sans" font-weight="700">
    <g>
      <text x="40" y="486" fill="#C7F464" font-size="13">01</text>
      <text x="90" y="492" fill="#E9ECE9" font-size="29">NOTICE</text>
    </g>
    <g>
      <text x="382" y="486" fill="#C7F464" font-size="13">02</text>
      <text x="432" y="492" fill="#E9ECE9" font-size="29">BUILD</text>
    </g>
    <g>
      <text x="40" y="574" fill="#C7F464" font-size="13">03</text>
      <text x="90" y="580" fill="#E9ECE9" font-size="29">USE</text>
    </g>
    <g>
      <text x="382" y="574" fill="#C7F464" font-size="13">04</text>
      <text x="432" y="580" fill="#FF5B4D" font-size="29">REVISE</text>
      <rect class="pulse" x="556" y="557" width="23" height="4" fill="#3D63FF" aria-hidden="true"/>
    </g>
  </g>

  <text x="548" y="615" class="mono" fill="#C7F464" font-size="11" font-weight="700">USE IT OR DELETE IT</text>
</svg>
