<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300" role="img" aria-labelledby="title desc">
  <title id="title">Woo Todo — native local-first tasks for macOS and Android</title>
  <desc id="desc">A dark cinematic project card with fluorescent green and cyan accents. It presents Woo Todo, its Swift, Kotlin, and end-to-end encryption stack, a macOS floating task panel, an Android home-screen widget, and a clearly labeled self-hosted encrypted sync path.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050711" />
      <stop offset="0.5" stop-color="#081019" />
      <stop offset="1" stop-color="#07170f" />
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.35" />
      <stop offset="0.46" stop-color="#84cc16" stop-opacity="0.46" />
      <stop offset="1" stop-color="#a3e635" stop-opacity="0.82" />
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d9f99d" />
      <stop offset="0.55" stop-color="#a3e635" />
      <stop offset="1" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a3e635" stop-opacity="0" />
      <stop offset="0.28" stop-color="#a3e635" />
      <stop offset="0.72" stop-color="#22d3ee" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="green-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a3e635" stop-opacity="0.23" />
      <stop offset="0.56" stop-color="#65a30d" stop-opacity="0.08" />
      <stop offset="1" stop-color="#65a30d" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="cyan-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.2" />
      <stop offset="0.62" stop-color="#0891b2" stop-opacity="0.06" />
      <stop offset="1" stop-color="#0891b2" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#a3e635" stroke-opacity="0.035" />
      <circle cx="0" cy="0" r="0.8" fill="#22d3ee" fill-opacity="0.1" />
    </pattern>
    <filter id="soft-glow" x="-120%" y="-120%" width="340%" height="340%">
      <feGaussianBlur stdDeviation="3.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect x="1" y="1" width="898" height="298" rx="24" />
    </clipPath>
  </defs>

  <style>
    .rail { animation: rail 5.4s linear infinite; }
    .sync-a { animation: sync-a 4.8s linear infinite; }
    .sync-b { animation: sync-b 6.2s linear infinite; }
    .pulse { animation: pulse 3.4s ease-in-out infinite; }
    .task-pulse { animation: task-pulse 5.2s ease-in-out infinite; }
    @keyframes rail { to { stroke-dashoffset: -72; } }
    @keyframes sync-a { to { stroke-dashoffset: -54; } }
    @keyframes sync-b { to { stroke-dashoffset: 54; } }
    @keyframes pulse { 0%, 100% { opacity: 0.36; } 50% { opacity: 1; } }
    @keyframes task-pulse { 0%, 24%, 100% { opacity: 0.34; } 42%, 78% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .rail, .sync-a, .sync-b, .pulse, .task-pulse { animation: none; }
    }
  </style>

  <rect x="1" y="1" width="898" height="298" rx="24" fill="url(#bg)" stroke="url(#border)" stroke-width="2" />
  <g clip-path="url(#frame)">
    <rect x="1" y="1" width="898" height="298" fill="url(#grid)" />
    <ellipse cx="706" cy="150" rx="270" ry="220" fill="url(#green-glow)" />
    <ellipse cx="840" cy="116" rx="190" ry="175" fill="url(#cyan-glow)" />
    <path d="M-24 266 C164 218 300 302 477 254 S738 218 930 256" fill="none" stroke="#a3e635" stroke-opacity="0.09" stroke-width="2" />
    <path d="M-18 284 C178 236 306 316 488 270 S750 236 924 272" fill="none" stroke="#22d3ee" stroke-opacity="0.075" />
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <circle class="pulse" cx="38" cy="35" r="5" fill="#a3e635" filter="url(#soft-glow)" />
    <text x="54" y="42" fill="#a8b5c8" font-size="18" letter-spacing="2.4">03 / ACTION SYSTEM</text>
    <line x1="38" y1="59" x2="862" y2="59" stroke="#263348" />
    <line class="rail" x1="38" y1="59" x2="862" y2="59" stroke="url(#signal)" stroke-width="2" stroke-dasharray="18 54" />
  </g>

  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="38" y="111" fill="url(#brand)" font-size="40" font-weight="800" letter-spacing="-0.5">Woo Todo</text>
    <text x="40" y="148" fill="#e8edf5" font-size="20" font-weight="600">Plan tonight. Move tomorrow.</text>
    <text x="40" y="178" fill="#95a3b6" font-size="18">Local-first across macOS + Android.</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">
    <rect x="38" y="201" width="92" height="38" rx="11" fill="#a3e635" fill-opacity="0.07" stroke="#a3e635" stroke-opacity="0.48" />
    <text x="55" y="226" fill="#d9f99d">SWIFT</text>
    <rect x="142" y="201" width="106" height="38" rx="11" fill="#a3e635" fill-opacity="0.07" stroke="#a3e635" stroke-opacity="0.48" />
    <text x="158" y="226" fill="#d9f99d">KOTLIN</text>
    <rect x="260" y="201" width="86" height="38" rx="11" fill="#22d3ee" fill-opacity="0.07" stroke="#22d3ee" stroke-opacity="0.45" />
    <text x="278" y="226" fill="#67e8f9">E2EE</text>
    <text x="40" y="274" fill="#77869c" letter-spacing="1.5">QUIET SOFTWARE · VISIBLE INTENT</text>
  </g>

  <g aria-hidden="true">
    <!-- macOS floating task panel -->
    <rect x="470" y="83" width="218" height="139" rx="16" fill="#0d181a" fill-opacity="0.82" stroke="#a3e635" stroke-opacity="0.56" />
    <rect x="470" y="83" width="218" height="35" rx="16" fill="#122124" fill-opacity="0.92" />
    <line x1="470" y1="118" x2="688" y2="118" stroke="#31423d" />
    <circle cx="490" cy="101" r="4" fill="#fb7185" />
    <circle cx="505" cy="101" r="4" fill="#fbbf24" />
    <circle cx="520" cy="101" r="4" fill="#a3e635" />
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">
      <text x="545" y="108" fill="#c7d4d0">macOS</text>
      <text x="489" y="145" fill="#d9f99d">TODAY / 03</text>
    </g>
    <circle cx="491" cy="168" r="8" fill="#a3e635" fill-opacity="0.12" stroke="#a3e635" />
    <path d="M487 168L490 171L496 164" fill="none" stroke="#d9f99d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <rect x="511" y="164" width="139" height="8" rx="4" fill="#7f9277" />
    <circle class="task-pulse" cx="491" cy="197" r="8" fill="#a3e635" fill-opacity="0.08" stroke="#a3e635" />
    <rect class="task-pulse" x="511" y="193" width="112" height="8" rx="4" fill="#667862" />

    <!-- Android home-screen widget -->
    <rect x="735" y="78" width="127" height="157" rx="22" fill="#0b171b" stroke="#22d3ee" stroke-opacity="0.58" />
    <rect x="748" y="91" width="101" height="128" rx="14" fill="#0f1f20" stroke="#a3e635" stroke-opacity="0.32" />
    <rect x="782" y="85" width="32" height="4" rx="2" fill="#4d6268" />
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">
      <text x="759" y="120" fill="#67e8f9">WIDGET</text>
      <text x="761" y="207" fill="#91a29c">23:10</text>
    </g>
    <circle cx="766" cy="145" r="6" fill="#a3e635" />
    <rect x="779" y="141" width="52" height="7" rx="3.5" fill="#829579" />
    <circle cx="766" cy="171" r="6" fill="none" stroke="#a3e635" />
    <rect x="779" y="167" width="42" height="7" rx="3.5" fill="#667861" />

    <!-- Device-to-device path; explicitly self-hosted, not a public cloud -->
    <path class="sync-a" d="M688 143 C708 125 720 125 740 143" fill="none" stroke="url(#signal)" stroke-width="2.4" stroke-linecap="round" stroke-dasharray="7 8" />
    <path class="sync-b" d="M740 175 C720 191 708 191 688 175" fill="none" stroke="#22d3ee" stroke-opacity="0.56" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 9" />
    <circle cx="714" cy="159" r="15" fill="#0b1718" stroke="#a3e635" stroke-opacity="0.8" />
    <rect x="708" y="158" width="12" height="9" rx="2" fill="#a3e635" fill-opacity="0.16" stroke="#d9f99d" />
    <path d="M710 158V154C710 149 718 149 718 154V158" fill="none" stroke="#d9f99d" stroke-width="1.8" stroke-linecap="round" />
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="18">
      <text x="538" y="268" fill="#a3e635" letter-spacing="1.2">SELF-HOSTED E2EE SYNC</text>
    </g>
  </g>

  <g fill="none" stroke="#8794a8" stroke-opacity="0.38">
    <path d="M22 44V22H44" />
    <path d="M856 22H878V44" />
    <path d="M22 256V278H44" />
    <path d="M856 278H878V256" />
  </g>
</svg>
