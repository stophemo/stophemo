<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="960"
     height="420"
     viewBox="0 0 960 420"
     role="img"
     aria-labelledby="hero-title hero-desc"
     focusable="false">
  <title id="hero-title">Stophemo，为不值得立项的小问题写代码</title>
  <desc id="hero-desc">Stophemo 的个人页横幅。左侧介绍他的工作方式与技术范围；右侧以编号展示观察、构建、使用和修订的循环，一条细线缓慢流动。</desc>

  <style>
    .sans {
      font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    .mono {
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    .route {
      animation: route-shift 12s linear infinite;
    }

    .pulse {
      animation: quiet-pulse 3.8s ease-in-out infinite;
    }

    @keyframes route-shift {
      to { stroke-dashoffset: -152; }
    }

    @keyframes quiet-pulse {
      0%, 100% { opacity: .3; }
      50% { opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      .route,
      .pulse {
        animation: none !important;
      }

      .pulse { opacity: 1; }
    }
  </style>

  <rect width="960" height="420" fill="#F4F6F3"/>
  <rect width="8" height="420" fill="#3D63FF"/>

  <g fill="none" stroke="#C7CED1" stroke-width="1" opacity=".55" aria-hidden="true">
    <path d="M48 68 H562"/>
    <path d="M48 162 H562"/>
    <path d="M48 352 H562"/>
    <path d="M48 28 V400"/>
    <path d="M218 28 V400"/>
    <path d="M388 28 V400"/>
    <path d="M562 28 V400"/>
  </g>

  <g class="mono" fill="#536067" font-size="12" font-weight="700">
    <text x="48" y="44">SOFTWARE ENGINEER / WEB · DESKTOP · ANDROID</text>
  </g>

  <g class="sans" fill="#17191F">
    <text x="48" y="138" font-size="72" font-weight="780">STOPHEMO</text>
    <rect x="48" y="151" width="104" height="6" fill="#3D63FF"/>
    <rect x="158" y="151" width="18" height="6" fill="#FF5B4D"/>

    <text x="48" y="214" font-size="29" font-weight="720"
          textLength="510" lengthAdjust="spacingAndGlyphs">I WRITE CODE FOR PROBLEMS</text>
    <text x="48" y="253" font-size="29" font-weight="720">TOO SMALL FOR A ROADMAP.</text>

    <text x="48" y="301" fill="#536067" font-size="17" font-weight="520">
      Most start as minor annoyances. The useful ones stay.
    </text>
    <text x="48" y="329" fill="#536067" font-size="17" font-weight="520">
      The rest become notes, or a reason to learn a new language.
    </text>
  </g>

  <g class="mono">
    <g transform="translate(48 0)">
      <text y="375" fill="#7A858B" font-size="10" font-weight="700">WEB</text>
      <text y="399" fill="#17191F" font-size="14" font-weight="700">TYPESCRIPT / VUE</text>
    </g>
    <g transform="translate(224 0)">
      <text y="375" fill="#7A858B" font-size="10" font-weight="700">DESKTOP</text>
      <text y="399" fill="#17191F" font-size="14" font-weight="700">RUST / SWIFT</text>
    </g>
    <g transform="translate(402 0)">
      <text y="375" fill="#7A858B" font-size="10" font-weight="700">ANDROID</text>
      <text y="399" fill="#17191F" font-size="14" font-weight="700">KOTLIN / JAVA</text>
    </g>
  </g>

  <rect x="610" width="350" height="420" fill="#17191F"/>
  <rect x="610" width="350" height="7" fill="#FF5B4D"/>
  <rect x="610" y="413" width="350" height="7" fill="#C7F464"/>

  <g class="mono">
    <text x="650" y="44" fill="#A7B0B5" font-size="12" font-weight="700">HOW THINGS TEND TO HAPPEN</text>
    <text x="822" y="64" fill="#A7B0B5" font-size="10" font-weight="700">ROUGHLY / NOT TO SCALE</text>
  </g>

  <g fill="none" stroke="#566067" stroke-width="1" aria-hidden="true">
    <path d="M650 119 H920"/>
    <path d="M650 190 H920"/>
    <path d="M650 261 H920"/>
    <path d="M650 332 H920"/>
  </g>

  <path class="route" d="M634 76 V332 H920 V155"
        fill="none" stroke="#C7F464" stroke-width="2"
        stroke-dasharray="8 11" stroke-linecap="square" aria-hidden="true"/>
  <path d="M913 163 L920 155 L927 163" fill="none" stroke="#C7F464" stroke-width="2" aria-hidden="true"/>

  <g class="sans" font-weight="700">
    <g>
      <text x="650" y="99" fill="#C7F464" font-size="13">01</text>
      <text x="706" y="102" fill="#E9ECE9" font-size="31">NOTICE</text>
    </g>
    <g>
      <text x="650" y="170" fill="#C7F464" font-size="13">02</text>
      <text x="706" y="173" fill="#E9ECE9" font-size="31">BUILD</text>
    </g>
    <g>
      <text x="650" y="241" fill="#C7F464" font-size="13">03</text>
      <text x="706" y="244" fill="#E9ECE9" font-size="31">USE</text>
    </g>
    <g>
      <text x="650" y="312" fill="#C7F464" font-size="13">04</text>
      <text x="706" y="315" fill="#FF5B4D" font-size="31">REVISE</text>
      <rect class="pulse" x="838" y="293" width="23" height="4" fill="#3D63FF" aria-hidden="true"/>
    </g>
  </g>

  <g class="mono" font-size="11" font-weight="700">
    <text x="650" y="371" fill="#A7B0B5">USE IT OR DELETE IT.</text>
  </g>
</svg>
