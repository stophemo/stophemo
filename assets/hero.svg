<svg xmlns="http://www.w3.org/2000/svg" width="900" height="360" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">Stephem Haul — AI systems builder</title>
  <desc id="desc">An animated neural aurora connecting memory, agents, and action.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050711" />
      <stop offset="0.52" stop-color="#0a0d1c" />
      <stop offset="1" stop-color="#07131d" />
    </linearGradient>
    <linearGradient id="border" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.9" />
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.32" />
      <stop offset="1" stop-color="#a3e635" stop-opacity="0.58" />
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa" />
      <stop offset="0.48" stop-color="#c084fc" />
      <stop offset="1" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="signal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0" />
      <stop offset="0.42" stop-color="#8b5cf6" />
      <stop offset="0.72" stop-color="#22d3ee" />
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="purple-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#8b5cf6" stop-opacity="0.32" />
      <stop offset="0.52" stop-color="#7c3aed" stop-opacity="0.09" />
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="cyan-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#22d3ee" stop-opacity="0.28" />
      <stop offset="0.58" stop-color="#0891b2" stop-opacity="0.08" />
      <stop offset="1" stop-color="#0891b2" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="core" cx="35%" cy="30%" r="72%">
      <stop offset="0" stop-color="#f5f3ff" />
      <stop offset="0.18" stop-color="#c4b5fd" />
      <stop offset="0.55" stop-color="#8b5cf6" />
      <stop offset="1" stop-color="#0891b2" />
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#a78bfa" stroke-opacity="0.055" />
      <circle cx="0" cy="0" r="1" fill="#22d3ee" fill-opacity="0.12" />
    </pattern>
    <filter id="glow" x="-160%" y="-160%" width="420%" height="420%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <clipPath id="frame">
      <rect x="1" y="1" width="1198" height="478" rx="28" />
    </clipPath>
  </defs>

  <style>
    .orbit-a { transform-box: view-box; transform-origin: 952px 239px; animation: orbit-a 26s linear infinite; }
    .orbit-b { transform-box: view-box; transform-origin: 952px 239px; animation: orbit-b 34s linear infinite; }
    .flow { animation: flow 5s linear infinite; }
    .flow-reverse { animation: flow-reverse 7s linear infinite; }
    .core { transform-box: view-box; transform-origin: 952px 239px; animation: core 4.6s ease-in-out infinite; }
    .wave { transform-box: view-box; transform-origin: 952px 239px; animation: wave 4.6s ease-out infinite; }
    .scan { animation: scan 9s ease-in-out infinite; }
    .blink { animation: blink 2.2s ease-in-out infinite; }
    @keyframes orbit-a { to { transform: rotate(360deg); } }
    @keyframes orbit-b { to { transform: rotate(-360deg); } }
    @keyframes flow { to { stroke-dashoffset: -72; } }
    @keyframes flow-reverse { to { stroke-dashoffset: 72; } }
    @keyframes core { 0%, 100% { transform: scale(.96); opacity: .86; } 50% { transform: scale(1.06); opacity: 1; } }
    @keyframes wave { 0% { transform: scale(.62); opacity: .5; } 70%, 100% { transform: scale(1.45); opacity: 0; } }
    @keyframes scan { 0%, 100% { transform: translateY(-90px); opacity: 0; } 22%, 78% { opacity: .42; } 50% { transform: translateY(310px); opacity: .15; } }
    @keyframes blink { 0%, 100% { opacity: .38; } 50% { opacity: 1; } }
    @media (prefers-reduced-motion: reduce) {
      .orbit-a, .orbit-b, .flow, .flow-reverse, .core, .wave, .scan, .blink { animation: none; }
    }
  </style>

  <rect x="1" y="1" width="1198" height="478" rx="28" fill="url(#bg)" stroke="url(#border)" stroke-width="2" />
  <g clip-path="url(#frame)">
    <rect x="1" y="1" width="1198" height="478" fill="url(#grid)" />
    <ellipse cx="920" cy="220" rx="370" ry="345" fill="url(#purple-glow)" />
    <ellipse cx="1110" cy="250" rx="310" ry="300" fill="url(#cyan-glow)" />
    <path d="M-30 432 C240 360 368 480 632 412 S1004 330 1240 394" fill="none" stroke="#8b5cf6" stroke-opacity="0.13" stroke-width="2" />
    <path d="M-18 450 C252 378 382 492 648 426 S1008 354 1238 410" fill="none" stroke="#22d3ee" stroke-opacity="0.1" />
    <g class="scan" opacity="0">
      <rect x="694" y="20" width="490" height="64" fill="url(#signal)" opacity="0.1" />
      <line x1="704" y1="78" x2="1184" y2="78" stroke="#67e8f9" stroke-opacity="0.55" />
    </g>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <circle cx="58" cy="48" r="5" fill="#a3e635" filter="url(#soft-glow)" />
    <text x="76" y="55" fill="#a7b2c8" font-size="16" letter-spacing="3.2">STOPHEMO / NEURAL WORKBENCH</text>
    <text x="1066" y="55" fill="#a3e635" font-size="15" letter-spacing="2.5">ONLINE</text>
    <path d="M58 78H342" stroke="url(#signal)" stroke-width="2" />
  </g>

  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif">
    <text x="56" y="161" fill="#f8faff" font-size="82" font-weight="800" letter-spacing="-1">STEPHEM</text>
    <text x="448" y="161" fill="url(#brand)" font-size="82" font-weight="800" letter-spacing="-1">HAUL</text>
    <text x="60" y="207" fill="#d9e0ee" font-size="25" font-weight="600" letter-spacing="0.3">I build systems that remember.</text>
    <text x="60" y="239" fill="#8f9bb2" font-size="18" letter-spacing="0.5">Turning scattered information into knowledge — and intent into action.</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="15" letter-spacing="1.4">
    <rect x="58" y="276" width="157" height="42" rx="12" fill="#8b5cf6" fill-opacity="0.09" stroke="#a78bfa" stroke-opacity="0.55" />
    <text x="80" y="303" fill="#c4b5fd">AI AGENTS</text>
    <rect x="228" y="276" width="225" height="42" rx="12" fill="#22d3ee" fill-opacity="0.07" stroke="#22d3ee" stroke-opacity="0.46" />
    <text x="250" y="303" fill="#67e8f9">KNOWLEDGE SYSTEMS</text>
    <rect x="466" y="276" width="190" height="42" rx="12" fill="#a3e635" fill-opacity="0.055" stroke="#a3e635" stroke-opacity="0.4" />
    <text x="488" y="303" fill="#bef264">CALM SOFTWARE</text>
  </g>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace">
    <rect x="58" y="356" width="598" height="68" rx="14" fill="#0d1224" fill-opacity="0.9" stroke="#29314b" />
    <rect x="58" y="356" width="5" height="68" rx="2.5" fill="url(#brand)" />
    <text x="84" y="383" fill="#7f8ba3" font-size="14" letter-spacing="2.3">NOW BUILDING</text>
    <text x="84" y="409" fill="#f3f0ff" font-size="18" font-weight="700" letter-spacing="1.1">DIGITAL BRAIN</text>
    <text x="279" y="409" fill="#8f9bb2" font-size="16">Knowledge designed to compound.</text>
    <circle class="blink" cx="628" cy="389" r="6" fill="#a3e635" filter="url(#soft-glow)" />
  </g>

  <g aria-hidden="true">
    <path d="M738 239 C782 154 850 108 952 106 C1055 105 1121 160 1164 240" fill="none" stroke="#8b5cf6" stroke-opacity="0.18" />
    <path d="M738 239 C780 326 850 371 952 372 C1055 372 1122 321 1164 240" fill="none" stroke="#22d3ee" stroke-opacity="0.16" />

    <g class="orbit-a">
      <circle cx="952" cy="239" r="150" fill="none" stroke="#a78bfa" stroke-opacity="0.24" stroke-width="1.5" stroke-dasharray="4 12" />
      <circle cx="952" cy="89" r="8" fill="#0a0d1c" stroke="#c4b5fd" stroke-width="2" />
      <circle cx="1082" cy="314" r="7" fill="#0a0d1c" stroke="#a3e635" stroke-width="2" />
      <circle cx="822" cy="314" r="7" fill="#0a0d1c" stroke="#22d3ee" stroke-width="2" />
    </g>
    <g class="orbit-b">
      <circle cx="952" cy="239" r="111" fill="none" stroke="#22d3ee" stroke-opacity="0.28" stroke-width="1.5" stroke-dasharray="2 10" />
      <circle cx="1063" cy="239" r="6" fill="#67e8f9" filter="url(#soft-glow)" />
      <circle cx="896" cy="143" r="6" fill="#c084fc" filter="url(#soft-glow)" />
      <circle cx="896" cy="335" r="6" fill="#a3e635" filter="url(#soft-glow)" />
    </g>

    <path class="flow" d="M758 239 C815 164 871 185 914 220 C937 239 966 241 990 222 C1041 182 1085 192 1144 239" fill="none" stroke="url(#signal)" stroke-width="2.3" stroke-linecap="round" stroke-dasharray="10 14" />
    <path class="flow-reverse" d="M786 336 C843 288 865 266 914 258 C951 252 983 271 1006 292 C1036 320 1070 325 1112 296" fill="none" stroke="#22d3ee" stroke-opacity="0.44" stroke-width="1.6" stroke-linecap="round" stroke-dasharray="8 16" />

    <circle class="wave" cx="952" cy="239" r="50" fill="none" stroke="#a78bfa" stroke-width="2" />
    <circle cx="952" cy="239" r="68" fill="#0b1020" fill-opacity="0.72" stroke="#8b5cf6" stroke-opacity="0.7" stroke-width="1.5" />
    <circle class="core" cx="952" cy="239" r="35" fill="url(#core)" filter="url(#glow)" />
    <circle cx="941" cy="227" r="7" fill="#ffffff" fill-opacity="0.78" />
    <path d="M930 244 L944 257 L975 220" fill="none" stroke="#f8faff" stroke-opacity="0.88" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round" />

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14" letter-spacing="2.4">
      <text x="725" y="235" fill="#c4b5fd">MEMORY</text>
      <text x="922" y="349" fill="#9aa6bd">AGENT</text>
      <text x="1090" y="235" fill="#67e8f9">ACTION</text>
      <text x="858" y="70" fill="#657189" font-size="12" letter-spacing="2">KNOWLEDGE CORE / LIVE</text>
    </g>
  </g>

  <g fill="none" stroke="#8691a8" stroke-opacity="0.4">
    <path d="M24 52V24H52" />
    <path d="M1148 24H1176V52" />
    <path d="M24 428V456H52" />
    <path d="M1148 456H1176V428" />
  </g>
</svg>
