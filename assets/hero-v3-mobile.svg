<svg xmlns="http://www.w3.org/2000/svg" width="720" height="640" viewBox="0 0 720 640" role="img" aria-labelledby="title desc" focusable="false">
  <title id="title">Stophemo 的周末乱造研究所</title>
  <desc id="desc">复古掌机风格的创意编程实验室，屏幕正在完成一个有趣的小实验。</desc>

  <style>
    .cursor {
      animation: cursor-blink 1.2s steps(2, end) infinite;
    }

    .steam-a {
      animation: steam-rise 2.8s ease-in-out infinite;
    }

    .steam-b {
      animation: steam-rise 3.3s ease-in-out .45s infinite;
    }

    .pixel-pal {
      animation: pixel-bob 2.4s steps(2, end) infinite;
    }

    @keyframes cursor-blink {
      0%, 44% { opacity: 1; }
      45%, 100% { opacity: 0; }
    }

    @keyframes steam-rise {
      0%, 100% { transform: translateY(5px); opacity: .18; }
      50% { transform: translateY(-5px); opacity: .78; }
    }

    @keyframes pixel-bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .cursor,
      .steam-a,
      .steam-b,
      .pixel-pal {
        animation: none;
      }
    }
  </style>

  <rect x="15" y="15" width="697" height="617" rx="28" fill="#2B2B2B" />
  <rect x="8" y="8" width="697" height="617" rx="28" fill="#F7F1E3" stroke="#2B2B2B" stroke-width="4" />

  <g aria-hidden="true">
    <rect x="42" y="33" width="18" height="18" fill="#F25F5C" />
    <rect x="62" y="33" width="18" height="18" fill="#F2C14E" />
    <rect x="82" y="33" width="18" height="18" fill="#2A9D8F" />
    <path d="M626 43h42M647 22v42" fill="none" stroke="#7CC6FE" stroke-width="8" />
  </g>

  <g font-family="Arial Black, Arial, Helvetica, sans-serif" font-weight="900">
    <text x="43" y="86" fill="#2B2B2B" font-size="70">HI, I'M</text>
    <path d="M46 112 L509 106 L503 174 L52 181 Z" fill="#2B2B2B" />
    <path d="M38 104 L501 98 L495 166 L44 173 Z" fill="#F2C14E" stroke="#2B2B2B" stroke-width="4" stroke-linejoin="round" />
    <text x="55" y="154" fill="#2B2B2B" font-size="70" textLength="425" lengthAdjust="spacingAndGlyphs">STOPHEMO.</text>
  </g>

  <g fill="#2B2B2B" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="32" font-weight="700">
    <text x="43" y="201">Mostly code. Sometimes useful.</text>
    <text x="43" y="239">Always for fun.</text>
  </g>

  <g aria-label="终端完成了一个有趣的小实验">
    <rect x="45" y="266" width="638" height="231" rx="28" fill="#2B2B2B" />
    <rect x="37" y="258" width="638" height="231" rx="28" fill="#7CC6FE" stroke="#2B2B2B" stroke-width="5" />
    <rect x="57" y="278" width="598" height="191" rx="20" fill="#F7F1E3" stroke="#2B2B2B" stroke-width="5" />
    <rect x="77" y="298" width="558" height="151" rx="12" fill="#2B2B2B" stroke="#2B2B2B" stroke-width="4" />

    <g opacity=".12" stroke="#7CC6FE" stroke-width="2" aria-hidden="true">
      <path d="M83 319h546M83 339h546M83 359h546M83 379h546M83 399h546M83 419h546M83 439h546" />
    </g>

    <g fill="#F7F1E3" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="34" font-weight="700">
      <text x="96" y="349"><tspan fill="#F2C14E">$</tspan> make something-fun</text>
      <text x="96" y="405" fill="#2A9D8F">done! (probably)</text>
      <rect class="cursor" x="435" y="376" width="20" height="34" fill="#F2C14E" aria-hidden="true" />
    </g>

    <g transform="translate(544 371)" aria-hidden="true">
      <g class="pixel-pal">
        <rect x="0" y="0" width="72" height="72" fill="#F2C14E" />
        <rect x="0" y="0" width="12" height="12" fill="#2B2B2B" />
        <rect x="60" y="0" width="12" height="12" fill="#2B2B2B" />
        <rect x="0" y="60" width="12" height="12" fill="#2B2B2B" />
        <rect x="60" y="60" width="12" height="12" fill="#2B2B2B" />
        <rect x="18" y="22" width="10" height="12" fill="#2B2B2B" />
        <rect x="44" y="22" width="10" height="12" fill="#2B2B2B" />
        <rect x="18" y="45" width="10" height="9" fill="#2B2B2B" />
        <rect x="28" y="54" width="16" height="8" fill="#2B2B2B" />
        <rect x="44" y="45" width="10" height="9" fill="#2B2B2B" />
      </g>
    </g>
  </g>

  <g aria-label="掌机方向键" transform="translate(62 523)">
    <path d="M34 0h38v28h28v38H72v28H34V66H6V28h28Z" fill="#2B2B2B" stroke="#2B2B2B" stroke-width="4" stroke-linejoin="round" />
    <rect x="39" y="33" width="28" height="28" rx="3" fill="#7CC6FE" />
  </g>

  <g aria-label="一杯热咖啡" transform="translate(278 527)">
    <path class="steam-a" d="M25 18c-13-10 12-19 0-31" fill="none" stroke="#2A9D8F" stroke-width="6" stroke-linecap="round" />
    <path class="steam-b" d="M53 18c-13-10 12-19 0-31" fill="none" stroke="#F25F5C" stroke-width="6" stroke-linecap="round" />
    <path d="M4 24h76v53c0 12-10 22-22 22H26C14 99 4 89 4 77Z" fill="#F7F1E3" stroke="#2B2B2B" stroke-width="5" />
    <path d="M80 37h12c13 0 18 9 18 19s-7 19-20 19H80" fill="none" stroke="#2B2B2B" stroke-width="7" />
    <path d="M17 39h51" stroke="#F25F5C" stroke-width="7" stroke-linecap="round" />
  </g>

  <g aria-label="像素小鸭" transform="translate(508 529)">
    <path d="M13 42H4V25l18 10V25h16V4h43v34h14v14H84v30H22V72H13Z" fill="#F2C14E" stroke="#2B2B2B" stroke-width="5" stroke-linejoin="round" />
    <path d="M79 18h26v15H79Z" fill="#F25F5C" stroke="#2B2B2B" stroke-width="5" />
    <rect x="65" y="11" width="8" height="9" fill="#2B2B2B" />
    <path d="M28 60h42" stroke="#F7F1E3" stroke-width="7" stroke-linecap="square" opacity=".75" />
  </g>
</svg>
