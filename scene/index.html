<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stophemo Spatial World</title>
    <style>
      * { box-sizing: border-box; }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #070708;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      body::after {
        position: fixed;
        inset: 0;
        box-shadow: inset 0 0 110px rgba(0, 0, 0, .48);
        content: "";
        pointer-events: none;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "/node_modules/three/build/three.module.js",
          "three/addons/": "/node_modules/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module" src="./main.js"></script>
  </body>
</html>
